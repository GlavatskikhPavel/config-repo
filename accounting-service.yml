server:
  port: ${SERVER_PORT:0}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/accounting-db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:1234}
  
  liquibase:
    change-log: db.changelog/db.changelog-master.yml
  
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false